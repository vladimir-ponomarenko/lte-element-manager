element:
  # Network element type managed by this EMS instance.
  type: enb
  # UDS path for JSON metrics emitted by the element.
  socket_path: /var/run/enb-metrics/enb_metrics.uds

bus:
  # Internal bus buffer size.
  buffer: 200

metrics:
  # Path where the latest raw JSON metrics snapshot is stored.
  snapshot_path: ""
  # Log raw UDS metrics as received.
  log_uds_metrics: false

log:
  # Default log level for all components.
  level: info
  # Output format: json or console.
  format: console
  # Colorize levels in console format.
  color: true
  # RFC3339 timestamps.
  timestamp: true
  # Optional per-component overrides.
  components:
    metrics: info
    adapter: info
    netconf: info

netconf:
  enabled: false
  addr: 0.0.0.0:8300
  transport: ssh
  snapshot_path: ""
  yang_dir: yang
  ssh:
    hostkey: ""
    authorized_key: ""
    username: admin

nrm:
  subnetwork: srsRAN
  managed_element: enb1
  enb_function_id: "1"

pm:
  enabled: false
  granularity_period: 10s
  report_period: 10s

control:
  enabled: false
  addr: 0.0.0.0:18080
  restart:
    docker_socket: /var/run/docker.sock
    timeout: 20s
    targets: []
    # target example:
    # targets:
    #   - container: ENB-1
    #     enb_config_path: /app/element-config/enb.conf
    #     rr_config_path: /app/element-config/rr.conf
